name: API CI

on:
  push:
    paths:
      - 'packages/api/**'
  pull_request:
    paths:
      - 'packages/api/**'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.9.0'
          cache: 'pnpm'

      - name: Install dependencies
        run: |
          cd packages/api
          pnpm install --frozen-lockfile

      - name: Run tests
        run: |
          cd packages/api
          pnpx prisma generate
          pnpm test
