AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Chase Light API - SAM Migration

Parameters:
  Stage:
    Type: String
    Default: stg
    Description: Deployment stage (dev, staging, prod)

  ApiUrl:
    Type: String
    Description: API URL

Globals:
  Function:
    Runtime: nodejs20.x
    MemorySize: 1024
    Timeout: 15
    Architectures:
      - x86_64
    Environment:
      Variables:
        STAGE: !Ref Stage
        TZ: Asia/Tokyo
        NODE_OPTIONS: '--import=/opt/nodejs/otel-setup.mjs'
        API_URL: !Ref ApiUrl
        # DATABASE_URL: !Sub '{{resolve:ssm-secure:/${Stage}/supabase/db_url}}'
        # OPENAI_API_KEY: !Sub '{{resolve:ssm-secure:/${Stage}/openai/api_key}}'
        AUTH0_DOMAIN: !Sub '{{resolve:ssm:/${Stage}/auth0/domain}}'
        ANALYZE_FEED_LOG_QUEUE_URL: !Ref FeedAnalyzeQueue
    Layers:
      - !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:layer:otel-collector:7'
      - !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:layer:common:27'
    Tracing: Active

Resources:
  # API Gateway
  ChaseLight:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub 'chase-light-${Stage}-api-gateway'
      StageName: !Ref Stage
      MinimumCompressionSize: 1024

  # User Handler Lambda Function
  UserHandlerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'chase-light-${Stage}-api-user-handler'
      CodeUri: ../../api/build
      Handler: index.handler
      Events:
        UserApiProxy:
          Type: Api
          Properties:
            RestApiId: !Ref ChaseLight
            Path: /users/{proxy+}
            Method: ANY
        UserApiRoot:
          Type: Api
          Properties:
            RestApiId: !Ref ChaseLight
            Path: /users
            Method: ANY
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
                - ssm:GetParameters
              Resource:
                - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${Stage}/supabase/db_url'
                - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${Stage}/openai/api_key'
                - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${Stage}/auth0/domain'
            - Effect: Allow
              Action:
                - xray:PutTraceSegments
                - xray:PutTelemetryRecords
              Resource: '*'
            - Effect: Allow
              Action:
                - sqs:SendMessage
              Resource: !GetAtt FeedAnalyzeQueue.Arn

  # SQS Queues (for compatibility with existing system)
  FeedAnalyzeDlq:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub 'chase-light-${Stage}-api-feed-analyze-dlq'
      MessageRetentionPeriod: 1209600

  FeedAnalyzeQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub 'chase-light-${Stage}-api-feed-analyze-queue'
      VisibilityTimeout: 300
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt FeedAnalyzeDlq.Arn
        maxReceiveCount: 5

Outputs:
  ApiGatewayUrl:
    Description: API Gateway endpoint URL
    Value: !Sub 'https://${ChaseLight}.execute-api.${AWS::Region}.amazonaws.com/${Stage}/'
    Export:
      Name: !Sub '${AWS::StackName}-ApiGatewayUrl'

  UserHandlerFunctionArn:
    Description: User Handler Lambda Function ARN
    Value: !GetAtt UserHandlerFunction.Arn
    Export:
      Name: !Sub '${AWS::StackName}-UserHandlerFunctionArn'
